<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Test SS API — LUM-vitae</title>
<style>
body { font-family: monospace; background: #0a0a0f; color: #e0e0e0; padding: 20px; max-width: 820px; }
h2 { color: #7ec8e3; }
.ok   { color: #4caf50; font-weight: bold; }
.err  { color: #f44336; font-weight: bold; }
.warn { color: #ff9800; font-weight: bold; }
.info { color: #90caf9; }
.log  { background: #111; border: 1px solid #2a2a2a; padding: 8px 12px; margin: 5px 0; border-radius: 4px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; }
button { background: #1a3a5c; color: #7ec8e3; border: 1px solid #7ec8e3; padding: 8px 22px;
         cursor: pointer; border-radius: 4px; font-size: 14px; margin: 4px; }
button:hover { background: #2a5a9c; }
#results { margin-top: 18px; }
</style>
</head>
<body>
<h2>🔬 Test Diagnóstico — LUM-vitae ALFA vΩ.4</h2>
<p style="color:#888; font-size:12px;">Abre este archivo en Chrome (<code>file://</code>) y pulsa el botón. No uses el navegador del asistente.</p>
<button onclick="runAllTests()">▶ Ejecutar todos los tests</button>
<button onclick="testSingle()">▶ Test rápido SS</button>
<button onclick="clearResults()">🗑 Limpiar</button>
<div id="results"></div>

<script>
const out = document.getElementById('results');

function log(html, cls) {
  const d = document.createElement('div');
  d.className = 'log';
  if (cls) html = `<span class="${cls}">${html}</span>`;
  d.innerHTML = html;
  out.appendChild(d);
  d.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function ts() {
  return new Date().toLocaleTimeString();
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

// Fetch SIN AbortController (evita bug de extensiones Chrome que no pueden clonar AbortSignal)
// Timeout usando Promise.race con un timer independiente
function fetchWithTimeout(url, timeoutMs) {
  var fetchPromise = fetch(url).then(function(r) {
    return { ok: r.ok, status: r.status, type: r.type, resp: r };
  });
  var timeoutPromise = new Promise(function(_, reject) {
    setTimeout(function() { reject(new Error('Timeout ' + timeoutMs + 'ms')); }, timeoutMs);
  });
  return Promise.race([fetchPromise, timeoutPromise]);
}

async function fetchSS(query) {
  var url = 'https://api.semanticscholar.org/graph/v1/paper/search'
            + '?query=' + encodeURIComponent(query)
            + '&limit=3&fields=title,year';
  try {
    var t0 = Date.now();
    var res = await fetchWithTimeout(url, 14000);
    var ms = Date.now() - t0;
    if (res.ok) {
      var data = await res.resp.json();
      return { ok: true, status: res.status, ms: ms, data: data };
    } else {
      return { ok: false, status: res.status, ms: ms, error: 'HTTP ' + res.status };
    }
  } catch(e) {
    return { ok: false, error: String(e.message || e) };
  }
}

async function testSingle() {
  out.innerHTML = '';
  log('[' + ts() + '] Probando SS API con una query...', 'info');
  var r = await fetchSS('Gustavo Bueno categorical closure theory epistemology');
  if (r.ok) {
    var papers = (r.data && r.data.data) || [];
    log('✅ SS API ACCESIBLE — ' + r.status + ' — ' + papers.length + ' papers en ' + r.ms + 'ms', 'ok');
    papers.forEach(function(p, i) {
      log('  [' + (i+1) + '] ' + (p.year||'?') + ' — ' + p.title);
    });
  } else {
    log('❌ SS API NO ACCESIBLE — ' + r.error, 'err');
  }
}

async function runAllTests() {
  out.innerHTML = '';
  log('═══ [' + ts() + '] INICIO DE DIAGNÓSTICO ═══', 'info');

  // ── Test 1: SS API query genérica ──────────────────────────────────────────
  log('\n[TEST 1] Semantic Scholar — query genérica ML...');
  var t1 = await fetchSS('machine learning neural network deep learning');
  if (t1.ok) {
    var n1 = ((t1.data && t1.data.data) || []).length;
    log('✅ Test 1 PASÓ — ' + n1 + ' papers en ' + t1.ms + 'ms', 'ok');
  } else {
    log('❌ Test 1 FALLÓ — ' + t1.error, 'err');
    log('   → API SS inaccesible desde este Chrome. El dashboard no puede buscar papers.', 'warn');
  }
  await sleep(500);

  // ── Test 2: SS API dominio FORM ────────────────────────────────────────────
  log('\n[TEST 2] Semantic Scholar — dominio FORM (matemáticas)...');
  var t2 = await fetchSS('algebraic topology homology cohomology mathematics');
  if (t2.ok) {
    var n2 = ((t2.data && t2.data.data) || []).length;
    log('✅ Test 2 PASÓ — ' + n2 + ' papers (FORM)', 'ok');
  } else {
    log('❌ Test 2 FALLÓ — ' + t2.error, 'err');
  }
  await sleep(500);

  // ── Test 3: SS API clásico filosófico ──────────────────────────────────────
  log('\n[TEST 3] Semantic Scholar — clásico TCC Gustavo Bueno...');
  var t3 = await fetchSS('Gustavo Bueno teoria del cierre categorial filosofia');
  if (t3.ok) {
    var papers3 = (t3.data && t3.data.data) || [];
    log('✅ Test 3 PASÓ — ' + papers3.length + ' papers en ' + t3.ms + 'ms', 'ok');
    if (papers3.length > 0) log('   Primer resultado: ' + (papers3[0].year||'?') + ' — ' + papers3[0].title);
  } else {
    log('❌ Test 3 FALLÓ — ' + t3.error, 'err');
  }
  await sleep(400);

  // ── Test 4: localStorage ───────────────────────────────────────────────────
  log('\n[TEST 4] localStorage...');
  try {
    localStorage.setItem('_lum_diag', Date.now().toString());
    var v = localStorage.getItem('_lum_diag');
    localStorage.removeItem('_lum_diag');
    log('✅ Test 4 PASÓ — localStorage funciona (valor: ' + v + ')', 'ok');
  } catch(e) {
    log('❌ Test 4 FALLÓ — localStorage bloqueado: ' + e.message, 'err');
    log('   → El historial MINERVA no puede guardarse.', 'warn');
  }

  // ── Test 5: sentinel lum_build_vitae.txt ───────────────────────────────────
  log('\n[TEST 5] Sentinel lum_build_vitae.txt...');
  var sentVitae = location.href.replace(/[^\/\\]*$/, 'lum_build_vitae.txt');
  try {
    var rv = await fetchWithTimeout(sentVitae + '?_=' + Date.now(), 5000);
    var tv = await rv.resp.text();
    tv = tv.trim();
    if (tv) {
      log('✅ Test 5 PASÓ — sentinel legible: "' + tv + '"', 'ok');
    } else {
      log('⚠️  Test 5 — sentinel vacío (regenera el dashboard con Python)', 'warn');
    }
  } catch(e) {
    log('❌ Test 5 FALLÓ — ' + e.message, 'err');
    log('   → Auto-reload del dashboard no funcionará.', 'warn');
  }

  // ── Test 6: sentinel lum_build_mapa.txt ───────────────────────────────────
  log('\n[TEST 6] Sentinel lum_build_mapa.txt...');
  var sentMapa = location.href.replace(/[^\/\\]*$/, 'lum_build_mapa.txt');
  try {
    var rm = await fetchWithTimeout(sentMapa + '?_=' + Date.now(), 5000);
    var tm = await rm.resp.text();
    tm = tm.trim();
    if (tm) {
      log('✅ Test 6 PASÓ — sentinel mapa legible: "' + tm + '"', 'ok');
    } else {
      log('⚠️  Test 6 — sentinel vacío (regenera el mapa con Python)', 'warn');
    }
  } catch(e) {
    log('❌ Test 6 FALLÓ — ' + e.message, 'err');
    log('   → Auto-reload del mapa no funcionará.', 'warn');
  }

  // ── Test 7: lum_minerva_historial en localStorage ─────────────────────────
  log('\n[TEST 7] lum_minerva_historial en localStorage...');
  try {
    var h = localStorage.getItem('lum_minerva_historial');
    if (h) {
      var arr = JSON.parse(h);
      log('✅ Test 7 PASÓ — historial con ' + arr.length + ' entradas', 'ok');
      if (arr.length > 0) {
        var last = arr[0];
        log('   Última entrada: ' + (last.timestamp||'?') + ' — source: ' + (last.source||'?') + ' — total: ' + (last.total_papers||0));
      }
    } else {
      log('⚠️  Test 7 — lum_minerva_historial vacío (aún no se ha buscado)', 'warn');
    }
  } catch(e) {
    log('❌ Test 7 FALLÓ — ' + e.message, 'err');
  }

  // ── Test 8: lum_clasicos_historial en localStorage ────────────────────────
  log('\n[TEST 8] lum_clasicos_historial en localStorage...');
  try {
    var hc = localStorage.getItem('lum_clasicos_historial');
    if (hc) {
      var arrc = JSON.parse(hc);
      log('✅ Test 8 PASÓ — historial clásicos con ' + arrc.length + ' entradas', 'ok');
    } else {
      log('⚠️  Test 8 — lum_clasicos_historial vacío', 'warn');
    }
  } catch(e) {
    log('❌ Test 8 FALLÓ — ' + e.message, 'err');
  }

  // ── Resumen ────────────────────────────────────────────────────────────────
  log('\n═══ [' + ts() + '] FIN DE DIAGNÓSTICO ═══', 'info');
  log('\n📋 INTERPRETACIÓN:');
  log('  Tests 1-3 ✅ → SS API accesible, el dashboard SÍ puede buscar papers.');
  log('  Tests 1-3 ❌ → SS API bloqueada. El dashboard no encontrará papers.');
  log('  Test  4   ❌ → localStorage bloqueado. Historial no puede guardarse.');
  log('  Tests 5-6 ❌ → Sentinels no legibles. Auto-reload no funciona.');
  log('  Tests 7-8 ✅ → Historial ya tiene datos previos.');
}

function clearResults() { out.innerHTML = ''; }
</script>
</body>
</html>
